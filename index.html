<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard | HHT Asset Management</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <link href="assets/css/style.css" rel="stylesheet">
</head>

<body>

  <script src="assets/components/sidebar.js"></script>
  <script src="assets/components/navbar.js"></script>

  <main class="main-content">

    <div class="page-header">
      <div>
        <h1>Dashboard</h1>
        <p>Monitoring status seluruh HHT secara real-time.</p>
      </div>

      <button class="btn btn-primary" onclick="refreshDashboard()">
        <i class="bi bi-arrow-clockwise"></i>
        Refresh
      </button>
    </div>

    <div class="row g-3 mb-4">

      <div class="col-md-4">
        <div class="stat-card">
          <div>
            <span>Total HHT</span>
            <h2 id="totalHHT">0</h2>
          </div>
          <i class="bi bi-hdd-network"></i>
        </div>
      </div>

      <div class="col-md-4">
        <div class="stat-card success">
          <div>
            <span>Available</span>
            <h2 id="availableHHT">0</h2>
          </div>
          <i class="bi bi-check-circle"></i>
        </div>
      </div>

      <div class="col-md-4">
        <div class="stat-card danger">
          <div>
            <span>Borrowed</span>
            <h2 id="borrowedHHT">0</h2>
          </div>
          <i class="bi bi-exclamation-circle"></i>
        </div>
      </div>

    </div>

    <section class="panel">

      <div class="panel-header">
        <h5>Daftar HHT</h5>

        <input 
          type="text" 
          id="searchInput" 
          class="form-control search-box" 
          placeholder="Cari nomor atau nama HHT..."
        >
      </div>

      <div id="hhtGrid" class="hht-grid"></div>

    </section>

  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/pages/dashboard.js"></script>

</body>
</html>
