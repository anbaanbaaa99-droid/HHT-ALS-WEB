<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>HHT Asset Management</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link 
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" 
    rel="stylesheet"
  >

  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  >

  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" 
    rel="stylesheet"
  >

  <link href="assets/css/style.css" rel="stylesheet">
</head>

<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-logo">
      <i class="bi bi-broadcast-pin-fill"></i>
      <span>HHT SYSTEM</span>
    </div>

    <nav class="sidebar-menu">

      <a href="#" class="menu-link active" data-page="dashboard">
        <i class="bi bi-speedometer2"></i>
        <span>Dashboard</span>
      </a>

      <a href="#" class="menu-link" data-page="borrow">
        <i class="bi bi-box-arrow-up"></i>
        <span>Peminjaman</span>
      </a>

      <a href="#" class="menu-link" data-page="return">
        <i class="bi bi-box-arrow-in-down"></i>
        <span>Pengembalian</span>
      </a>

      <a href="#" class="menu-link" data-page="report">
        <i class="bi bi-file-earmark-text"></i>
        <span>Report</span>
      </a>

      <a href="#" class="menu-link" data-page="master">
        <i class="bi bi-hdd-stack"></i>
        <span>Master HHT</span>
      </a>

    </nav>

    <div class="sidebar-footer">
      <a href="#" class="menu-link" data-page="setting">
        <i class="bi bi-gear"></i>
        <span>Setting</span>
      </a>
    </div>

  </aside>


  <!-- TOPBAR -->
  <header class="topbar">

    <div>
      <strong>HHT Asset Management</strong>
      <div id="todayText" class="topbar-date">-</div>
    </div>

    <div class="topbar-right">

      <div id="clockText" class="topbar-clock">
        --:--:--
      </div>

      <i class="bi bi-bell topbar-icon"></i>

      <div class="user-box">
        <i class="bi bi-person-circle"></i>
        <span>Admin</span>
      </div>

    </div>

  </header>


  <!-- MAIN CONTENT -->
  <main class="main-content">

    <div id="app">
      <!-- Content SPA akan muncul di sini -->
    </div>

  </main>


  <!-- MODAL PEMINJAMAN -->
  <div class="modal fade" id="borrowModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-scrollable modal-lg">
      <form class="modal-content" id="borrowForm">

        <div class="modal-header">
          <h5 class="modal-title">Form Peminjaman HHT</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <input type="hidden" id="borrowHhtId">

          <div class="mb-3">
            <label class="form-label">HHT</label>
            <input type="text" id="borrowHhtName" class="form-control" readonly>
          </div>

          <div class="mb-3">
            <label class="form-label">Nama Peminjam</label>
            <input 
              type="text" 
              id="borrowName" 
              class="form-control" 
              placeholder="Masukkan nama peminjam"
              required
            >
          </div>

          <div class="mb-3">
            <label class="form-label">Department</label>
            <select id="borrowDepartment" class="form-select" required>
              <option value="">Pilih Department</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">
              Foto Wajah Peminjam
              <span class="text-danger">*</span>
            </label>

            <input 
              type="file" 
              id="borrowPhoto" 
              class="form-control" 
              accept="image/*" 
              capture="user"
              required
            >

            <div class="form-text">
              Ambil foto wajah peminjam menggunakan kamera.
            </div>

            <div class="photo-preview mt-3">
              <img id="borrowPhotoPreview" src="" alt="Preview Foto Peminjam">
            </div>
          </div>

        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">
            Batal
          </button>

          <button type="submit" class="btn btn-primary">
            Pinjam
          </button>
        </div>

      </form>
    </div>
  </div>


  <!-- MODAL PENGEMBALIAN -->
  <div class="modal fade" id="returnModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-scrollable modal-lg">
      <form class="modal-content" id="returnForm">

        <div class="modal-header">
          <h5 class="modal-title">Konfirmasi Pengembalian</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <input type="hidden" id="returnHhtId">

          <div class="alert alert-info" id="returnInfo">
            Data HHT
          </div>

          <div class="mb-3">
            <label class="form-label">
              Foto Wajah Pengembali
              <span class="text-danger">*</span>
            </label>

            <input 
              type="file" 
              id="returnPhoto" 
              class="form-control" 
              accept="image/*" 
              capture="user"
              required
            >

            <div class="form-text">
              Ambil foto wajah orang yang mengembalikan HHT.
            </div>

            <div class="photo-preview mt-3">
              <img id="returnPhotoPreview" src="" alt="Preview Foto Pengembali">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Catatan</label>
            <textarea 
              id="returnNote" 
              class="form-control" 
              rows="3" 
              placeholder="Opsional"
            ></textarea>
          </div>

        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">
            Batal
          </button>

          <button type="submit" class="btn btn-success">
            Kembalikan
          </button>
        </div>

      </form>
    </div>
  </div>


  <!-- LIBRARY -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


  <!-- APP SCRIPT -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>

</body>
</html>
